spring:
  datasource:
    url: jdbc:h2:mem:detoxmate-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

auth:
  jwt:
    secret: this-is-a-very-long-secret-key-for-test-only
    access-token-expires-in: 3600
  refresh-token:
    expires-in: 15552000
