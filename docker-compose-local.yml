services:
  mysql:
    image: mysql:8.4
    container_name: detoxmate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: detoxmate-local
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - detoxmate_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=Asia/Seoul
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  detoxmate_mysql_data:
