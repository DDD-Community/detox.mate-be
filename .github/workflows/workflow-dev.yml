name: Detoxmate Dev CI/CD

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  APP_NAME: detoxmate
  CONTAINER_NAME: detoxmate-dev
  APP_PORT: 8080

jobs:
  build:
    name: Build Jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build bootJar
        run: ./gradlew clean bootJar -x test

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: build/libs/*.jar
          retention-days: 1

  deploy:
    name: Deploy on EC2
    needs: build
    runs-on: [self-hosted, linux, ARM64]

    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-jar
          path: deploy

      - name: Check downloaded files
        run: ls -al deploy

      - name: Rename jar for docker build
        run: |
          JAR_FILE=$(find deploy -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "Executable jar not found"
            exit 1
          fi
          cp "$JAR_FILE" deploy/app.jar

      - name: Create .env file
        run: |
          cat <<EOF > deploy/.env
          SPRING_PROFILES_ACTIVE=dev
          DEV_DB_URL=${{ secrets.DEV_DB_URL }}
          DEV_DB_USERNAME=${{ secrets.DEV_DB_USERNAME }}
          DEV_DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}
          EOF

      - name: Create Dockerfile
        run: |
          cat <<'EOF' > deploy/Dockerfile
          FROM eclipse-temurin:21-jre
          WORKDIR /app
          COPY app.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "app.jar"]
          EOF

      - name: Stop and remove old container
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} || true

      - name: Remove old image
        run: |
          docker rmi ${{ env.APP_NAME }}:latest || true

      - name: Build docker image locally
        run: |
          docker build -t ${{ env.APP_NAME }}:latest ./deploy

      - name: Run new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --restart unless-stopped \
            -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} \
            --env-file deploy/.env \
            -e SPRING_PROFILES_ACTIVE=dev \
            ${{ env.APP_NAME }}:latest

      - name: Remove .env file
        run: rm -f deploy/.env

      - name: Cleanup unused images
        run: |
          docker image prune -f
